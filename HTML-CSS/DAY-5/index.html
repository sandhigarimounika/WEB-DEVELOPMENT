<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Froms in HTML</h1>

    <form>
        <input type="text" placeholder="Enter username" required>
        <input type="password" placeholder="password" required>
        <input type="submit" value="login">
    </form>

    <h3>Gender</h3>
    <input type="radio" name="gender" id="male">
    <label for="male">Male</label>

    <input type="radio" name="gender" id="female">
    <label for="female">Female</label>

    <input type="radio" name="gender" id="others">
    <label for="others">Others</label>

    <h3>Hobbies</h3>

    <input type="checkbox" name="hobbies" id="eating">
    <label for="eating">Eating</label>

    <input type="checkbox" name="hobbies" id="music">
    <label for="music">Listen to a music</label>

    <input type="checkbox" name="hobbies" id="cooking">
    <label for="cooking">Cooking</label>

    <select name="" id="">
        <option value="">English</option>
        <option value="">Telugu</option>
        <option value="">Hindi</option>
    </select>

    <h3>Text area</h3>
    <textarea name="" id="" row="50" cols="70"></textarea>
</body>
</html>
